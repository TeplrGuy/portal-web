name: issue-triage

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: read
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const text = `${issue.title}\n${issue.body || ''}`.toLowerCase();

            const desiredLabels = [];
            if (text.includes('portal') || text.includes('frontend') || text.includes('ui')) desiredLabels.push('frontend');
            if (text.includes('enhancement') || text.includes('feature')) desiredLabels.push('enhancement');
            if (text.includes('incident') || text.includes('failure') || text.includes('timeout')) desiredLabels.push('incident');
            if (text.includes('contract') || text.includes('inventory') || text.includes('notification') || text.includes('cross-service')) desiredLabels.push('cross-service');
            if (text.includes('delegate') || text.includes('parallel') || text.includes('multi-agent')) desiredLabels.push('delegated-candidate');

            const labelsToEnsure = [
              ['frontend', '0E8A16', 'Portal and UI work'],
              ['enhancement', 'A2EEEF', 'Feature or enhancement work'],
              ['incident', 'D73A4A', 'Runtime or production issue'],
              ['cross-service', '5319E7', 'Touches multiple services or contracts'],
              ['delegated-candidate', 'FBCA04', 'Good candidate for cloud-agent parallelization']
            ];

            for (const [name, color, description] of labelsToEnsure) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name,
                    color,
                    description
                  });
                } else {
                  throw error;
                }
              }
            }

            if (desiredLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: desiredLabels
              });
            }

            const route = desiredLabels.includes('cross-service')
              ? 'Split into a local owner task plus one delegated/cloud-agent slice on a separate branch.'
              : 'Default to a single local owner branch unless parallel work is explicitly needed.';

            const commentBody = [
              '<!-- portal-triage-comment -->',
              '## Automated triage summary',
              '',
              `**Recommended route:** ${route}`,
              '',
              '**Required gates:**',
              '- CI',
              '- Security',
              '- Playwright portal flow',
              '- Human PR review',
              '',
              '**Notes for session ownership:**',
              '- One issue = one primary owner',
              '- One branch = one session/agent',
              '- Reviewer workflow stays separate from implementation'
            ].join('\n');

            const existingComments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number
            });

            const triageComment = existingComments.find(comment => comment.body.includes('<!-- portal-triage-comment -->'));
            if (triageComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: triageComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: commentBody
              });
            }
